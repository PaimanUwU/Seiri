name: Seiri CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26' # Keeping it fresh for 2026
        check-latest: true
        cache: true 
        
    - name: Install dependencies
      run: go mod download

    - name: Verify Code Formatting
      run: test -z "$(gofmt -l .)" || (echo "Run 'go fmt ./...' to fix formatting!" && exit 1)

    - name: Build TUI (Native Linux)
      run: go build -v -o seiri-linux main.go

    - name: Build for Mac (Cross-Compile Check)
      run: GOOS=darwin GOARCH=arm64 go build -v -o seiri-mac main.go

    - name: Run Tests
      run: go test -v ./...
